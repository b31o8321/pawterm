name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Android APK — split per ABI, built on Ubuntu
  # ─────────────────────────────────────────────────────────────
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get
        working-directory: app

      - name: Build APKs
        run: flutter build apk --release --split-per-abi
        working-directory: app

      - name: Rename APKs
        run: |
          VERSION="${{ github.ref_name }}"          # e.g. v0.3.1
          VER="${VERSION#v}"                        # strip leading v
          OUT="app/build/app/outputs/flutter-apk"
          mkdir -p dist
          cp "$OUT/app-arm64-v8a-release.apk"   "dist/pawterm-${VER}-arm64-v8a.apk"
          cp "$OUT/app-armeabi-v7a-release.apk" "dist/pawterm-${VER}-armeabi-v7a.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: dist/*.apk
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # macOS .app — SwiftUI MenuBarExtra, universal binary, unsigned
  # ─────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build .app bundle
        run: bash build.sh
        working-directory: mac

      - name: Zip .app (preserves resource forks via ditto)
        run: |
          VERSION="${{ github.ref_name }}"
          VER="${VERSION#v}"
          cd mac
          ditto -c -k --keepParent PawTerm.app "../dist-mac/PawTerm-${VER}-mac.zip" || {
            mkdir -p ../dist-mac
            ditto -c -k --keepParent PawTerm.app "../dist-mac/PawTerm-${VER}-mac.zip"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: dist-mac/*.zip
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Combined GitHub Release — pulls all artifacts then publishes
  # ─────────────────────────────────────────────────────────────
  release:
    needs: [build-apk, build-mac]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read server version
        id: server_ver
        run: echo "ver=$(python3 -c "import json; print(json.load(open('server/package.json'))['version'])")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}  ·  server v${{ steps.server_ver.outputs.ver }}"
          generate_release_notes: true
          files: |
            artifacts/android-apks/*.apk
            artifacts/mac-app/*.zip
          body: |
            ## Downloads

            - 📱 **Android APK** — `pawterm-*-arm64-v8a.apk` for modern devices, `armeabi-v7a` for older
            - 🍎 **macOS .app** — `PawTerm-*-mac.zip`. Unsigned MVP. After download:
              ```
              unzip PawTerm-*-mac.zip
              xattr -d com.apple.quarantine PawTerm.app
              mv PawTerm.app /Applications/
              ```
              First launch: status bar 🐾 icon appears. Click → Install Server (if needed) / Open Admin / Show QR / Show PIN.

            See README for [install.sh](https://github.com/Airoucat233/pawterm/blob/main/install.sh) one-liner.
