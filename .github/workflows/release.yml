name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get
        working-directory: app

      - name: Build APKs
        run: flutter build apk --release --split-per-abi
        working-directory: app

      - name: Rename APKs
        run: |
          VERSION="${{ github.ref_name }}"          # e.g. v0.3.1
          VER="${VERSION#v}"                        # strip leading v
          OUT="app/build/app/outputs/flutter-apk"
          cp "$OUT/app-arm64-v8a-release.apk"   "pawterm-${VER}-arm64-v8a.apk"
          cp "$OUT/app-armeabi-v7a-release.apk" "pawterm-${VER}-armeabi-v7a.apk"

      - name: Read server version
        id: server_ver
        run: echo "ver=$(python3 -c "import json; print(json.load(open('server/package.json'))['version'])")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}  ·  server v${{ steps.server_ver.outputs.ver }}"
          generate_release_notes: true
          files: |
            pawterm-*-arm64-v8a.apk
            pawterm-*-armeabi-v7a.apk
