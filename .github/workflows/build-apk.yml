name: Build APK (branch artifact)

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
    paths:
      - 'app/**'
      - 'packages/shared/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get
        working-directory: app

      - name: Flutter analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos
        working-directory: app

      - name: Build APKs
        run: flutter build apk --release --split-per-abi
        working-directory: app

      - name: Read app version
        id: app_ver
        run: |
          ver=$(grep -E '^version:' app/pubspec.yaml | awk '{print $2}')
          echo "ver=$ver" >> "$GITHUB_OUTPUT"

      - name: Rename APKs
        run: |
          VER="${{ steps.app_ver.outputs.ver }}"
          SAFE="${VER//+/_}"
          OUT=app/build/app/outputs/flutter-apk
          mkdir -p artifacts
          cp "$OUT/app-arm64-v8a-release.apk"   "artifacts/pawterm-${SAFE}-arm64-v8a.apk"
          cp "$OUT/app-armeabi-v7a-release.apk" "artifacts/pawterm-${SAFE}-armeabi-v7a.apk" || true
          ls -lh artifacts/

      - name: Compute artifact name
        id: artifact
        run: |
          ref="${GITHUB_REF_NAME//\//-}"
          ver="${{ steps.app_ver.outputs.ver }}"
          safe_ver="${ver//+/_}"
          echo "name=pawterm-apk-${ref}-${safe_ver}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: artifacts/*.apk
          retention-days: 14
