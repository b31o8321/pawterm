name: pawterm
description: Mobile client for AI coding assistants — control Claude Code and more from your phone.
publish_to: 'none'
version: 0.7.3+2

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  web_socket_channel: ^3.0.1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_markdown: ^0.7.3
  xterm: ^4.0.0
  intl: ^0.20.2
  uuid: ^4.5.3
  flutter_slidable: ^3.1.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  file_picker: ^8.0.0
  open_file: ^3.0.5
  permission_handler: ^12.0.0+1
  pdfx: ^2.7.0
  package_info_plus: ^8.0.0
  mobile_scanner: ^6.0.2

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: SymbolsNerdFontMono
      fonts:
        - asset: assets/fonts/nerd-symbols.ttf
