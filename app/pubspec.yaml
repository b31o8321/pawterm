name: claude_companion
description: Mobile client to control Claude Code via the Claude Companion server.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  web_socket_channel: ^3.0.1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_markdown: ^0.7.3
  xterm: ^4.0.0
  intl: ^0.20.2
  uuid: ^4.5.3
  flutter_slidable: ^3.1.1

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: SymbolsNerdFontMono
      fonts:
        - asset: assets/fonts/nerd-symbols.ttf
